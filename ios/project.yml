name: CodexRemote

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.12.1"

targets:
  CodexRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexRemote
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.codexremote
        TARGETED_DEVICE_FAMILY: "2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CodexRemote/Info.plist
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: Citadel

  CodexRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexRemoteTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CodexRemote

schemes:
  CodexRemote:
    build:
      targets:
        CodexRemote: all
        CodexRemoteTests: [test]
    test:
      targets:
        - CodexRemoteTests
