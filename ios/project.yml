name: CodexRemote

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans

# appearance-locale：声明已知区域，确保 String Catalog 编出 zh-Hans 与 en .lproj。
knownRegions:
  - zh-Hans
  - en
  - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    # 模拟器 keychain entitlement 需 entitlements 实际签入二进制：
    # CODE_SIGNING_ALLOWED=NO 会丢弃 entitlements 导致 SecItemAdd 返回 errSecMissingEntitlement(-34018)。
    # 故启用本地 ad-hoc 签名（"Sign to Run Locally"），keychain-access-groups 方能生效。
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.12.1"

targets:
  CodexRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexRemote
        excludes:
          - "Info.plist"
          - "CodexRemote.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tangyujie.codexremote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CodexRemote/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexRemote/CodexRemote.entitlements
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: Citadel

  CodexRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexRemoteTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CodexRemote

schemes:
  CodexRemote:
    build:
      targets:
        CodexRemote: all
        CodexRemoteTests: [test]
    test:
      targets:
        - CodexRemoteTests
